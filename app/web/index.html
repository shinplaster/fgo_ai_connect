<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ios-connect</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>ios-connect</h1>
    <div id="status" class="status">接続中...</div>
  </header>

  <main>
    <div id="screen-wrap" class="screen-wrap">
      <img id="screen" alt="iPhone screen" />
      <div id="overlay" class="overlay hidden"></div>
      <div id="hint" class="hint hidden">WDA 未接続。Phase 0 の検証を完了してください。</div>
    </div>

    <aside class="controls">
      <h2>操作</h2>
      <div class="buttons">
        <button data-button="home">ホーム</button>
        <button data-button="volumeUp">音量↑</button>
        <button data-button="volumeDown">音量↓</button>
        <button data-button="snapshot">電源</button>
      </div>

      <h2>テキスト入力</h2>
      <div class="keys">
        <input id="text-input" type="text" placeholder="入力して送信" />
        <button id="send-text">送信</button>
      </div>

      <h2>ヒント</h2>
      <p>クリック=タップ ／ ドラッグ=スワイプ ／ 長押し(500ms以上)=長押し</p>
    </aside>
  </main>

  <script src="/app.js"></script>
</body>
</html>
