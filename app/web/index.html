<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fgo_ai_connect</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>fgo_ai_connect</h1>
    <div id="status" class="status">未接続</div>
  </header>

  <main>
    <div id="screen-wrap" class="screen-wrap">
      <img id="screen" alt="iPhone screen" />
      <div id="ripple" class="ripple hidden"></div>
      <div id="overlay" class="overlay">
        <div id="hint" class="hint">右側の「接続」ボタンを押してください。</div>
      </div>
    </div>

    <aside class="controls">
      <h2>接続</h2>
      <div class="buttons">
        <button id="connect-btn">接続</button>
        <button id="disconnect-btn" class="hidden">切断</button>
      </div>

      <h2>ヒント</h2>
      <p>クリック=タップ ／ ドラッグ=スワイプ ／ 長押し(500ms以上)=長押し</p>
    </aside>
  </main>

  <script src="/app.js"></script>
</body>
</html>
